services:
  mysql:
    image: mysql:8.4
    container_name: lendstore-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Bhargavaram@143
      MYSQL_DATABASE: lendstore
      MYSQL_USER: lendstore_user
      MYSQL_PASSWORD: Bhargavaram@143
    ports:
      - "3386:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "mysql", "-pBhargavaram@143"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: lendstore-backend
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        EXPO_PUBLIC_API_URL: /api
    container_name: lendstore-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - EXPO_PUBLIC_API_URL=/api

volumes:
  mysql_data:
